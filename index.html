<!DOCTYPE html>
<html>
<head>
<title>Music</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
background-color: #121212;
color: white;
font-family: Arial;
margin: 0;
display: flex;
}

/* SIDEBAR */
#menu {
width: 220px;
height: 100vh;
background-color: #000;
padding: 20px;
position: fixed;
left: 0;
top: 0;
}

#logo {
font-size: 28px;
font-weight: bold;
color: #1DB954;
text-decoration: none;
display: block;
margin-bottom: 25px;
}

/* SEARCH */
.search-box {
position: relative;
}

#search {
width: 180px;
height: 34px;
background-color: #181818;
border: 1px solid #333;
color: white;
padding-left: 12px;
border-radius: 20px;
outline: none;
transition: 0.3s;
}

#search:focus {
border: 1px solid #1DB954;
box-shadow: 0 0 8px #1DB954;
}

/* 🔍 SUGGESTIONS (FIXED PROPERLY) */
#suggestions {
position: absolute;
top: 100%;
left: 0;
width: 100%;
margin-top: 6px;
background: #181818;
border-radius: 10px;
overflow: hidden;
display: none;
z-index: 1000;
box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.suggestion {
padding: 10px;
cursor: pointer;
transition: 0.2s;
}

.suggestion:hover {
background: #282828;
color: #1DB954;
}

/* MAIN */
#conteudo {
margin-left: 240px;
padding: 30px;
width: calc(100% - 240px);
}

h2 {
font-size: 26px;
margin-bottom: 20px;
}

/* ROW */
.grid {
display: flex;
gap: 20px;
overflow-x: auto;
padding-bottom: 10px;
scroll-behavior: smooth;
}

/* SCROLLBAR */
.grid::-webkit-scrollbar {
height: 6px;
}

.grid::-webkit-scrollbar-thumb {
background: #1DB954;
border-radius: 10px;
}

/* CARD */
.album {
min-width: 180px;
width: 180px;
background-color: #181818;
border-radius: 12px;
padding: 12px;
transition: 0.3s, opacity 0.3s, transform 0.3s;
cursor: pointer;
text-align: center;
flex: 0 0 auto;
}

.album:hover {
background-color: #282828;
transform: translateY(-5px);
}

/* 🎬 ANIMATION */
.album.hide {
opacity: 0;
transform: scale(0.8);
pointer-events: none;
}

/* IMAGE */
.album img {
width: 100%;
height: 160px;
object-fit: cover;
border-radius: 10px;
display: block;
margin: 0 auto 10px auto;
}

/* TEXT */
.album b {
font-size: 14px;
display: block;
margin-bottom: 4px;
}

.album span {
font-size: 12px;
color: #b3b3b3;
}

/* LINKS */
a {
text-decoration: none;
color: white;
}

/* MOBILE */
@media (max-width: 768px) {

body {
flex-direction: column;
}

#menu {
width: 100%;
height: auto;
position: relative;
display: flex;
align-items: center;
justify-content: space-between;
}

#search {
width: 120px;
height: 30px;
}

#conteudo {
margin-left: 0;
width: 100%;
padding: 15px;
}

.grid {
gap: 12px;
}

.album {
min-width: 140px;
width: 140px;
padding: 10px;
}

.album img {
height: 120px;
}

}

</style>
</head>

<body>

<div id="menu">
<a id="logo" href="#">Spotify</a>

<div class="search-box">
<input type="text" id="search" placeholder="Search..." onkeyup="procurar()">
<div id="suggestions"></div>
</div>

</div>

<div id="conteudo">
<h2>What do you want to listen to?</h2>

<div class="grid">

<a href="The-Weeknd.html">
<div class="album">
<img src="Images/the weeknd.jpg">
<b>The Weeknd</b>
<span>Artist</span>
</div>
</a>

<a href="Lana-Del-Rey.html">
<div class="album">
<img src="Images/lana del rey.jpg">
<b>Lana Del Rey</b>
<span>Artist</span>
</div>
</a>

<a href="The-Neighbourhood.html">
<div class="album">
<img src="Images/the neighbourhood.jpg">
<b>The Neighbourhood</b>
<span>Artist</span>
</div>
</a>

<a href="Talha-Anjum.html">
<div class="album">
<img src="Images/talha anjum.jpg">
<b>Talha Anjum</b>
<span>Artist</span>
</div>
</a>

<a href="Turkish.html">
<div class="album">
<img src="Images/turkey.png">
<b>Turkish</b>
<span>Language</span>
</div>
</a>

</div>
</div>

<script>

let suggestions = document.getElementById("suggestions");

function procurar() {
let input = document.getElementById("search").value.toLowerCase();
let cards = document.getElementsByClassName("album");

suggestions.innerHTML = "";
let count = 0;

for (let card of cards) {
let text = card.innerText.toLowerCase();

/* 🎬 FILTER */
if (text.includes(input)) {
card.classList.remove("hide");

/* 🔍 SUGGESTIONS */
if (input && count < 5) {
let div = document.createElement("div");
div.className = "suggestion";

/* GET NAME + IMAGE + LINK */
let name = card.querySelector("b").innerText;
let imgSrc = card.querySelector("img").src;
let link = card.parentElement.href;

/* BUILD UI (ICON + NAME) */
div.innerHTML = `
  <img src="${imgSrc}" style="width:22px;height:22px;border-radius:4px;margin-right:8px;vertical-align:middle;">
  ${name}
`;

/* CLICK → OPEN PAGE */
div.onclick = function () {
window.location.href = link;
};

suggestions.appendChild(div);
count++;
}

} else {
card.classList.add("hide");
}
}

/* SHOW / HIDE */
suggestions.style.display = input ? "block" : "none";
}

</script>

</body>
</html>
