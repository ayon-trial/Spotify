<!DOCTYPE html>
<html>
<head>
<title>Music</title>

<style>
body {
background-color: #121212;
color: white;
font-family: Arial;
margin: 0;
display: flex;
}

/* SIDEBAR */
#menu {
width: 220px;
height: 100vh;
background-color: #000;
padding: 20px;
position: fixed;
left: 0;
top: 0;
}

#logo {
font-size: 28px;
font-weight: bold;
color: #1DB954;
text-decoration: none;
display: block;
margin-bottom: 25px;
}

/* SEARCH */
#search {
width: 180px;
height: 34px;
background-color: #181818;
border: 1px solid #333;
color: white;
padding-left: 12px;
border-radius: 20px;
outline: none;
transition: 0.3s;
}

/* ✅ GREEN EFFECT ON CLICK */
#search:focus {
border: 1px solid #1DB954;
box-shadow: 0 0 8px #1DB954;
}

/* MAIN */
#conteudo {
margin-left: 240px;
padding: 30px;
width: calc(100% - 240px);
}

h2 {
font-size: 26px;
margin-bottom: 20px;
}

/* ROW */
.grid {
display: flex;
gap: 20px;
overflow-x: auto;
padding-bottom: 10px;
scroll-behavior: smooth;
}

/* SCROLLBAR */
.grid::-webkit-scrollbar {
height: 6px;
}

.grid::-webkit-scrollbar-thumb {
background: #1DB954;
border-radius: 10px;
}

/* CARD */
.album {
min-width: 180px;
width: 180px;
background-color: #181818;
border-radius: 12px;
padding: 12px;
transition: 0.3s;
cursor: pointer;
text-align: center;
flex: 0 0 auto;
}

.album:hover {
background-color: #282828;
transform: translateY(-5px);
}

/* IMAGE */
.album img {
width: 100%;
height: 160px;
object-fit: cover;
border-radius: 10px;
display: block;
margin: 0 auto 10px auto;
}

/* TEXT */
.album b {
font-size: 14px;
display: block;
margin-bottom: 4px;
}

.album span {
font-size: 12px;
color: #b3b3b3;
}

/* LINKS */
a {
text-decoration: none;
color: white;
}
</style>
</head>

<body>

<div id="menu">
<a id="logo" href="#">Spotify</a>
<input type="text" id="search" placeholder="Search..." onkeyup="procurar()">
</div>

<div id="conteudo">
<h2>What do you want to listen to?</h2>

<div class="grid">

<a href="The-Weeknd.html">
<div class="album">
<img src="Images/the weeknd.jpg">
<b>The Weeknd</b>
<span>Artist</span>
</div>
</a>

<a href="Lana-Del-Rey.html">
<div class="album">
<img src="Images/lana del rey.jpg">
<b>Lana Del Rey</b>
<span>Artist</span>
</div>
</a>

<a href="The-Neighbourhood.html">
<div class="album">
<img src="Images/the neighbourhood.jpg">
<b>The Neighbourhood</b>
<span>Artist</span>
</div>
</a>

<a href="Russian.html">
<div class="album">
<img src="Images/russia.png">
<b>Russian</b>
<span>Language</span>
</div>
</a>

<a href="Turkish.html">
<div class="album">
<img src="Images/turkey.png">
<b>Turkish</b>
<span>Language</span>
</div>
</a>

</div>
</div>

<script>
function procurar() {
let input = document.getElementById("search").value.toLowerCase();
let cards = document.getElementsByClassName("album");

for (let card of cards) {
let text = card.innerText.toLowerCase();
card.style.display = text.includes(input) ? "block" : "none";
}
}
</script>

</body>
</html>
